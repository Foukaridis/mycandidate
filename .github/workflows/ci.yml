name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest safety bandit

    - name: SAST - Python Code Security Scanning (Bandit)
      run: bandit -r main/

    # - name: Dependency Vulnerability Scanning (Safety)
    #   run: safety check

    - name: Run Tests
      # Assuming a testing db is spun up or mocked
      run: pytest tests/test_api.py -v
      env:
        FLASK_ENV: development
  docker-security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build an image from Dockerfile
      run: |
        docker build -t mycandidate:${{ github.sha }} .

    - name: Container Image Vulnerability Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'mycandidate:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
